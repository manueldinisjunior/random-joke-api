<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Random Joke Generator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            flex-direction: column;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f0f0f0;\n        }\n        button {\n            padding: 10px 20px;\n            font-size: 16px;\n            cursor: pointer;\n        }\n        #joke {\n            margin: 20px;\n            font-size: 24px;\n            text-align: center;\n        }\n    </style>\n</head>\n<body>\n    <h1>Random Joke Generator</h1>\n    <div id=\"joke\">Click the button to get a joke!</div>\n    <button id=\"jokeButton\">Get Joke</button>\n\n    <script>\n        document.getElementById('jokeButton').addEventListener('click', async () => {\n            const response = await fetch('https://official-joke-api.appspot.com/random_joke');\n            const data = await response.json();\n            document.getElementById('joke').innerHTML = `${data.setup} - ${data.punchline}`;\n        });\n    </script>\n</body>\n</html>
